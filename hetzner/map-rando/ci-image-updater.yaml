# This sets up a ServiceAccount and RoleBinding for the GitHub Actions CI to be
# able to update the Docker image for the dev.maprando.com site.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-updater
  namespace: default
---
apiVersion: v1
kind: Secret
metadata:
  name: image-updater-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: image-updater
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: deployment-patcher
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["maprando-web-dev"]
  verbs: ["get", "patch", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-updater-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: image-updater
  namespace: default
roleRef:
  kind: Role
  name: deployment-patcher
  apiGroup: rbac.authorization.k8s.io
