apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redirect
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /redirect/$1
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - hetzner.maprando.com
    - www.maprando.com
    secretName: maprando-com-tls
  rules:
  - host: hetzner.maprando.com
    http:
      paths:
      - pathType: ImplementationSpecific
        path: /(.*)
        backend:
          service:
            name: maprando-web-dev
            port:
              number: 80
  - host: www.maprando.com
    http:
      paths:
      - pathType: ImplementationSpecific
        path: /(.*)
        backend:
          service:
            name: maprando-web-dev
            port:
              number: 80
